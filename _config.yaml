# site properties and page defaults
title: Hasanov Lab
subtitle: Code to Clinic
description: Bridging computational biology and clinical oncology to understand and combat brain metastasis.
header: images/brain.jpg
footer: images/brain.jpg
proofer: false

# site url settings
baseurl: ""
url: "https://hasanov-lab.github.io"

# site social media and other links
links:
  email: elshad.hasanov@osumc.edu
  google-scholar: R6wSHlgAAAAJ
  github: hasanov-lab
  twitter: HasanovLab

### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post

collections:
  # generate page for each member
  members:
    output: true
  # generate page for each post
  posts:
    output: true

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
